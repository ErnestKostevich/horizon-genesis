# Builds Horizon Genesis for Windows and macOS on every v* tag push,
# then uploads the installers as assets on the matching GitHub Release.
#
# To ship a release:
#   1. Bump "version" in package.json
#   2. git commit -am "v1.0.1" && git tag v1.0.1 && git push --follow-tags
#   3. This workflow creates the release, builds both platforms, attaches installers.
#
# macOS builds are unsigned. Users will see Gatekeeper prompt — right-click → Open.
# To code-sign/notarize later, set CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
# APPLE_TEAM_ID as repo secrets and uncomment the env block below.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            build_script: build:win
            artifact_glob: |
              dist/*.exe
              dist/*.exe.blockmap
          - os: macos-latest
            label: mac
            build_script: build:mac
            artifact_glob: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
          - os: ubuntu-latest
            label: linux
            build_script: build:linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # Electron postinstall downloads prebuilt binaries; cache is OK in GH
          ELECTRON_SKIP_BINARY_DOWNLOAD: ''

      # Stamp build-info.json so the packaged app recognises itself as an official build.
      # Without this file, src/main/main.js shows the source-preview page and exits.
      # This is the ONLY place the marker is created — source clones never have it.
      - name: Stamp build-info.json
        shell: bash
        run: |
          cat > src/main/build-info.json <<EOF
          {
            "official": true,
            "version": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "buildDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runner": "${{ matrix.label }}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}"
          }
          EOF
          echo "----- build-info.json -----"
          cat src/main/build-info.json

      - name: Build ${{ matrix.label }}
        run: npm run ${{ matrix.build_script }}
        env:
          # electron-builder picks these up for GitHub publish / auto-update later
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment to enable macOS code-sign + notarize (see header comment):
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts (retained for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: horizon-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: horizon-windows
          path: release-assets/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: horizon-mac
          path: release-assets/mac

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: horizon-linux
          path: release-assets/linux

      - name: Create / update release with assets
        uses: softprops/action-gh-release@v2
        with:
          name: Horizon Genesis ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-assets/windows/*
            release-assets/mac/*
            release-assets/linux/*
          body: |
            ## Horizon Genesis ${{ github.ref_name }}

            Desktop AI agent — local-first, MIT, bring-your-own-keys.

            ### Downloads

            - **Windows:** `Horizon AI Setup *.exe` (x64, NSIS)
            - **macOS:** `Horizon AI-*.dmg` (Intel + Apple Silicon, **unsigned** — right-click → Open to bypass Gatekeeper)
            - **Linux:** `Horizon AI-*.AppImage` (x64, portable) or `horizon-ai_*.deb` (Debian/Ubuntu)

            Auto-generated release notes below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
